## Apache reverse proxy config to forward http://localhost/ -> http://127.0.0.1:8002/
## Copy this into your Apache/XAMPP vhost (for example in httpd-vhosts.conf) and restart Apache.
## Make sure the modules mod_proxy and mod_proxy_http are enabled.

<VirtualHost *:80>
  ServerName localhost
  ProxyPreserveHost On
  ProxyRequests Off

  # Forward all requests to the Next.js dev server running on 8002
  ProxyPass / http://127.0.0.1:8002/
  ProxyPassReverse / http://127.0.0.1:8002/

  # Optional: increase timeout for long-running requests
  ProxyTimeout 300

  # Allow proxying to local host
  <Proxy http://127.0.0.1:8002/*>
    Require local
  </Proxy>
</VirtualHost>

# Notes:
# 1) On Windows XAMPP, enable these lines in httpd.conf (uncomment):
#    LoadModule proxy_module modules/mod_proxy.so
#    LoadModule proxy_http_module modules/mod_proxy_http.so
# 2) Add this file's contents to your Apache vhosts (or include it), then restart Apache.
# 3) Keep the Next dev server running on port 8002 while developing.
